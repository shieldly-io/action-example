name: Test Shieldly Action
on: [push]
jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shieldly-io/action@v1.0.0
        id: shieldly
        with:
          scan-path: ./iac
      - if: always()
        run: |
          echo "Score: ${{ steps.shieldly.outputs.score }}"
          echo "Risk: ${{ steps.shieldly.outputs.risk-level }}"
          echo "Findings: ${{ steps.shieldly.outputs.findings-count }}"
          echo "Critical: ${{ steps.shieldly.outputs.critical-count }}"
